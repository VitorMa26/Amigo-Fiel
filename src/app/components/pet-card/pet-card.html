<div class="card">
  <div class="card-body">
    <h4 class="card-title">{{ pet().name }}</h4>
    <h6 class="badge bg-success">{{ pet().status }}</h6>

    <p class="card-text">{{ pet().description }}</p>
    <p class="card-text">{{ pet().size }}</p>
    <p class="card-text">{{ pet().species }}</p>

    <div class="row">
      <button class="btn btn-primary">Adotar</button>
    </div>
  </div>
</div>
