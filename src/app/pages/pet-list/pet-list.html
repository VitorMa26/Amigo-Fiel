<div class="filters">
  <input type="text" placeholder="Buscar..." />
  <label for="especie">Escolha sua especie</label>
  <select name="especie" id="especie">
    <option value="todos">Todos</option>
    <option value="viralata">Viralata</option>
    <option value="papagaio">Papagaio</option>
    <option value="tartaruga">Tartaruga</option>
  </select>
  <label for="porte">Escolha o porte</label>
  <select name="porte" id="porte">
    <option value="todos">Todos</option>
    <option value="pequeno">Pequeno</option>
    <option value="medio">Medio</option>
    <option value="grande">Grande</option>
  </select>
</div>
<ul class="grid-container">
  @for (pet of pets; track $index) {
    <li class="list-item card">
      <h2 class="card-title">{{ pet.name }}</h2>
      <h3 class="card-subtitle text-body-secondary">{{ pet.specie }}</h3>
      <h4>{{ pet.size }}</h4>
      <h5>{{ pet.breed }}</h5>
      <span class="badge rounded-pill" [ngClass]="pet.status ? 'bg-primary' : 'bg-secondary'">
        {{ pet.status ? 'Adotado' : 'Disponível' }}
      </span>
      <p class="card-text">{{ pet.description }}</p>
      <button id="btn-adotar" type="button" class="btn btn-primary">Quero adotar</button>
    </li>
  }
</ul>
