<a id="btn-cadastro" type="button" class="btn btn-primary" href="/admin/petForm">Cadastrar Pet</a>

<table id="tabela" class="table table-striped">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Espécie</th>
      <th>Idade</th>
      <th>Porte</th>
      <th>Status</th>
      <th></th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    @for (pet of pets(); track $index) {
      <tr>
        <td>{{ pet.name }}</td>
        <td>{{ pet.species }}</td>
        <td>{{ pet.age }}</td>
        <td>{{ pet.size }}</td>
        <td>{{ pet.status }}</td>
        <td>
          <button class="btn btn-outline-info" (click)="handleEdit(pet.id)">
            <i class="bi bi-pencil"></i>
          </button>
        </td>
        <td>
          <button class="btn btn-danger" (click)="handleDelete(pet.id)">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    }
  </tbody>
</table>
