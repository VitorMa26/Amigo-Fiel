<a [routerLink]="['/admin/petForm']" id="btn-cadastro" type="button" class="btn btn-primary">Cadastrar Pet </a>

<table id="tabela" class="table table-striped">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Espécie</th>
      <th>Idade</th>
      <th>Porte</th>
      <th>Status</th>
      <th>Editar</th>
      <th>Excluir</th>
    </tr>
  </thead>
  <tbody>
    @for (pet of pets; track $index) {
      <tr>
        <td>{{ pet.name }}</td>
        <td>{{ pet.species }}</td>
        <td>{{ pet.age }}</td>
        <td>{{ pet.size }}</td>
        <td>{{ pet.status }}</td>
        <td>Editar</td>
        <td>Excluir</td>
      </tr>
    }
  </tbody>
</table>
